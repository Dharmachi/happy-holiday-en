<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0e6b6a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="快乐假期" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <title>快乐假期 · Unit 1 Happy Holiday</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #17333a;
      --muted: #5b737a;
      --bg: #eef7f4;
      --card: #ffffff;
      --line: #c9ddd8;
      --sea: #0e6b6a;
      --sea-soft: #d4efec;
      --sun: #e8a317;
      --sun-soft: #fff1cc;
      --coral: #d45b45;
      --ok: #2f7d4a;
      --bad: #b33b3b;
      --safe: env(safe-area-inset-bottom, 0px);
      --display: "Fraunces", "Noto Sans SC", serif;
      --body: "Noto Sans SC", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    html { font-size: 17px; }
    body {
      margin: 0;
      min-height: 100%;
      font-family: var(--body);
      color: var(--ink);
      background:
        radial-gradient(800px 380px at 10% -10%, #c8ebe4 0%, transparent 55%),
        radial-gradient(700px 360px at 100% 0%, #ffe7b0 0%, transparent 45%),
        linear-gradient(180deg, #f7fcfa 0%, var(--bg) 40%, #e7f3ef 100%);
      -webkit-tap-highlight-color: transparent;
    }
    .app {
      max-width: 920px;
      margin: 0 auto;
      padding: 18px 16px calc(40px + var(--safe));
    }
    h1, h2 {
      font-family: var(--display);
      letter-spacing: -0.02em;
      margin: 0 0 8px;
    }
    h1 { font-size: 2.1rem; line-height: 1.15; }
    h2 { font-size: 1.2rem; }
    .eyebrow {
      margin: 0 0 6px;
      color: var(--sea);
      font-weight: 700;
      font-size: 0.92rem;
    }
    .tagline, .muted, .en {
      color: var(--muted);
      line-height: 1.5;
    }
    .tagline { margin: 0 0 14px; }
    .hero {
      margin-bottom: 18px;
      padding: 8px 2px 4px;
    }
    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .stat {
      background: var(--sea-soft);
      color: var(--sea);
      border-radius: 12px;
      padding: 8px 12px;
      font-weight: 700;
      font-size: 0.92rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .card.soft { background: rgba(255,255,255,0.72); }
    .card.center { text-align: center; }
    .block { margin: 18px 0; }
    .section-title {
      margin: 0 0 10px;
      color: var(--sea);
    }
    .goal-list {
      margin: 8px 0 0;
      padding-left: 1.1em;
      line-height: 1.55;
    }
    .games {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .game-btn {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 16px;
      padding: 14px 12px;
      text-align: left;
      font: inherit;
      color: inherit;
      cursor: pointer;
      min-height: 92px;
      transition: transform .12s ease, border-color .12s ease;
    }
    .game-btn:active { transform: scale(0.98); }
    .game-btn strong {
      display: block;
      font-family: var(--display);
      font-size: 1.08rem;
      margin-bottom: 4px;
    }
    .game-btn span {
      display: block;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.4;
    }
    .game-btn em {
      display: block;
      margin-top: 8px;
      font-style: normal;
      color: var(--sea);
      font-size: 0.78rem;
      font-weight: 700;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
    }
    .back, .ghost, .primary, .mini, .choice, .match-card, .word-chip, .tab {
      font: inherit;
      cursor: pointer;
      color: var(--ink);
    }
    .back, .ghost, .primary {
      border-radius: 12px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      background: #fff;
    }
    .primary {
      background: var(--sea);
      border-color: var(--sea);
      color: #fff;
      font-weight: 700;
      width: 100%;
      margin-top: 10px;
    }
    .ghost {
      background: var(--sun-soft);
      border-color: #efd48a;
      margin-top: 8px;
    }
    .back { font-weight: 700; }
    .chip {
      background: var(--sea-soft);
      color: var(--sea);
      border-radius: 12px;
      padding: 8px 12px;
      font-weight: 700;
      font-size: 0.9rem;
    }
    .big-en {
      font-family: var(--display);
      font-size: 1.85rem;
      line-height: 1.25;
      margin: 10px 0;
      word-break: break-word;
    }
    .prompt-line { font-size: 1.35rem; }
    .zh-line {
      font-size: 1.25rem;
      font-weight: 700;
      margin: 8px 0;
    }
    .pos { color: var(--muted); margin: 0; font-size: 0.92rem; }
    .choices, .row { display: grid; gap: 10px; }
    .row { grid-template-columns: 1fr 1fr; margin-top: 10px; }
    .choice {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 14px;
      padding: 14px;
      text-align: left;
      min-height: 52px;
    }
    .choice span {
      display: block;
      color: var(--muted);
      margin-top: 4px;
      font-size: 0.88rem;
    }
    .choice.on { border-color: var(--sea); background: var(--sea-soft); font-weight: 700; }
    .choice.ok, .cloze-input.ok { border-color: var(--ok); background: #e5f5ea; }
    .choice.bad, .cloze-input.bad { border-color: var(--bad); background: #fdeaea; }
    .match-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .match-col { display: grid; gap: 8px; align-content: start; }
    .match-card {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 14px;
      padding: 14px 10px;
      min-height: 68px;
    }
    .match-card.sel { outline: 3px solid var(--sea); background: var(--sea-soft); }
    .match-card.done { opacity: 0.35; pointer-events: none; }
    .spell {
      width: 100%;
      margin: 12px 0 4px;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      font: inherit;
      font-size: 1.15rem;
      text-align: center;
    }
    .tip {
      margin-top: 12px;
      background: var(--sun-soft);
      border-radius: 12px;
      padding: 12px;
      color: #7a5a18;
      line-height: 1.45;
      white-space: pre-wrap;
    }
    .tip.ok { background: #e5f5ea; color: var(--ok); }
    .tip.bad { background: #fdeaea; color: var(--bad); }
    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 8px;
      margin-bottom: 4px;
    }
    .tab {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 0.88rem;
    }
    .tab.on {
      background: var(--sea);
      border-color: var(--sea);
      color: #fff;
      font-weight: 700;
    }
    .cloze-body {
      line-height: 2;
      font-size: 1.02rem;
    }
    .cloze-input {
      display: inline-block;
      width: 7.5em;
      margin: 0 4px;
      padding: 4px 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font: inherit;
      text-align: center;
    }
    .word-pool, .build-line {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0;
      min-height: 44px;
    }
    .build-line {
      background: #f4fbf9;
      border: 1px dashed var(--line);
      border-radius: 14px;
      padding: 12px;
      align-items: center;
    }
    .word-chip {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 12px;
      padding: 10px 12px;
      font-weight: 600;
    }
    .word-chip.on { background: var(--sea-soft); border-color: var(--sea); }
    .order-picked { display: grid; gap: 8px; margin-top: 10px; }
    .order-item {
      display: grid;
      grid-template-columns: 36px 1fr;
      gap: 10px;
      align-items: start;
      background: #f4fbf9;
      border-radius: 12px;
      padding: 10px;
    }
    .order-item span {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--sea);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 700;
      font-size: 0.85rem;
    }
    .order-item p { margin: 2px 0 0; color: var(--muted); font-size: 0.9rem; }
    .dialogue { display: grid; gap: 10px; margin-top: 12px; }
    .line {
      background: #f4fbf9;
      border-radius: 14px;
      padding: 12px;
      position: relative;
    }
    .line p { margin: 4px 0 0; line-height: 1.5; }
    .mini {
      position: absolute;
      right: 10px;
      top: 10px;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 0.8rem;
    }
    .read-body {
      margin-top: 12px;
      line-height: 1.7;
      font-size: 1.05rem;
    }
    .example {
  margin: 12px 0 6px;
  line-height: 1.55;
  font-size: 1.05rem;
  text-align: left;
}
.big-example { font-size: 1.2rem; }
.example mark, .big-example mark {
  background: var(--sun-soft);
  color: var(--ink);
  padding: 0 4px;
  border-radius: 4px;
  font-weight: 700;
}
.tip-note { font-size: 0.9rem; }
.flash-card { cursor: pointer; }
.notebook-item.due { border-color: #e8a317; background: #fffaf0; }
.notebook-top { display: flex; justify-content: space-between; gap: 8px; align-items: start; }
.due-banner .primary { margin-top: 8px; }
.ghost:disabled, .choice:disabled { opacity: 0.7; cursor: default; }
.pk-setup {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 12px;
}
.pk-name {
  display: grid;
  gap: 6px;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 12px;
  font-weight: 700;
}
.pk-name input {
  font: inherit;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid var(--line);
}
.pk-name.pk-a { border-color: #e08a7a; background: #fff5f2; }
.pk-name.pk-b { border-color: #6aa7c8; background: #f0f8fc; }
.pk-scoreboard {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 10px;
  align-items: center;
  margin-bottom: 10px;
}
.pk-score {
  border-radius: 14px;
  padding: 12px;
  text-align: center;
  border: 1px solid var(--line);
  background: #fff;
}
.pk-score span {
  display: block;
  font-family: var(--display);
  font-size: 2rem;
  line-height: 1.1;
  margin-top: 4px;
}
.pk-score.a { background: #fff5f2; border-color: #e08a7a; color: #b24735; }
.pk-score.b { background: #f0f8fc; border-color: #6aa7c8; color: #1f5f7a; }
.pk-vs {
  font-family: var(--display);
  font-weight: 700;
  color: var(--muted);
}
.pk-arena {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 8px;
}
.pk-col {
  border-radius: 16px;
  padding: 10px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,0.85);
}
.pk-col.a { background: #fff8f6; border-color: #e8b4aa; }
.pk-col.b { background: #f5fbfe; border-color: #9bc4d8; }
.pk-col.locked { opacity: 0.55; }
.pk-col-title {
  margin: 0 0 8px;
  font-weight: 700;
  text-align: center;
}
.pk-opt { min-height: 56px; }
.pk-opt.side-a:active { background: #ffe0d6; }
.pk-opt.side-b:active { background: #d9eef8; }
.pk-final {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 10px;
  align-items: center;
  margin: 12px 0;
}
@media (min-width: 768px) {
  .pk-arena { gap: 16px; }
  .pk-opt { min-height: 64px; font-size: 1.08rem; }
}
.flash-card { cursor: pointer; }
.choice:disabled { opacity: 0.95; }
.shoot-hud {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 8px;
}
.shoot-arena {
  position: relative;
  height: min(46vh, 380px);
  min-height: 280px;
  margin: 8px 0 12px;
  border: 1px solid var(--line);
  border-radius: 18px;
  background:
    linear-gradient(180deg, rgba(14,107,106,0.08), transparent 40%),
    #f7fcfa;
  overflow: hidden;
}
.falling {
  position: absolute;
  left: 50%;
  top: 12px;
  width: min(88%, 420px);
  transform: translate(-50%, 0);
  background: #fff;
  border: 2px solid var(--sea);
  border-radius: 16px;
  padding: 12px 14px;
  box-shadow: 0 8px 18px rgba(23, 51, 58, 0.08);
  text-align: center;
  will-change: transform;
}
.falling p { margin: 6px 0 0; font-size: 1.08rem; line-height: 1.45; word-break: break-word; }
.falling-kind {
  display: inline-block;
  background: var(--sun-soft);
  color: #7a5a18;
  border-radius: 8px;
  padding: 2px 8px;
  font-size: 0.78rem;
  font-weight: 700;
}
.falling.bang {
  border-color: var(--ok);
  background: #e5f5ea;
  animation: pop .35s ease;
}
@keyframes pop {
  0% { transform: translateX(-50%) scale(1); }
  50% { transform: translate(-50%, var(--fall-y, 0px)) scale(1.06); }
  100% { transform: translate(-50%, var(--fall-y, 0px)) scale(0.92); opacity: 0.35; }
}
.ground-line {
  position: absolute;
  left: 12px; right: 12px; bottom: 14px;
  height: 4px;
  border-radius: 4px;
  background: var(--coral);
  opacity: 0.55;
}
.shoot-choices .choice { min-height: 58px; font-size: 1.05rem; }
.grammar-rule { margin-bottom: 14px; }
.grammar-rule p { line-height: 1.55; color: var(--ink); }
.grammar-ex {
  position: relative;
  padding: 12px 40px 12px 0;
  border-bottom: 1px solid var(--line);
  margin-bottom: 8px;
}
.grammar-ex:last-child { border-bottom: 0; }
.group-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 12px;
}
.group-card {
  background: #f4fbf9;
  border-radius: 12px;
  padding: 10px;
}
.group-card p { margin: 6px 0 0; color: var(--muted); font-size: 0.88rem; line-height: 1.4; }
@media (min-width: 768px) {
  html { font-size: 18px; }
  .games { grid-template-columns: 1fr 1fr 1fr; }
  .choice, .game-btn, .match-card { min-height: 60px; }
  .shoot-arena { height: min(50vh, 460px); }
  .app { padding-left: 24px; padding-right: 24px; }
}
@media (max-width: 520px) {
  html { font-size: 16px; }
  .games { grid-template-columns: 1fr; }
  .big-en { font-size: 1.55rem; }
  .group-grid { grid-template-columns: 1fr; }
}
  </style>
</head>
<body>
  <div class="app" id="app"></div>
  <script src="./data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
