<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0e6b6a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="快乐假期" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <title>快乐假期 · Unit 1 Happy Holiday</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #17333a;
      --muted: #5b737a;
      --bg: #eef7f4;
      --card: #ffffff;
      --line: #c9ddd8;
      --sea: #0e6b6a;
      --sea-soft: #d4efec;
      --sun: #e8a317;
      --sun-soft: #fff1cc;
      --coral: #d45b45;
      --ok: #2f7d4a;
      --bad: #b33b3b;
      --safe: env(safe-area-inset-bottom, 0px);
      --display: "Fraunces", "Noto Sans SC", serif;
      --body: "Noto Sans SC", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    html { font-size: 17px; }
    body {
      margin: 0;
      min-height: 100%;
      font-family: var(--body);
      color: var(--ink);
      background:
        radial-gradient(800px 380px at 10% -10%, #c8ebe4 0%, transparent 55%),
        radial-gradient(700px 360px at 100% 0%, #ffe7b0 0%, transparent 45%),
        linear-gradient(180deg, #f7fcfa 0%, var(--bg) 40%, #e7f3ef 100%);
      -webkit-tap-highlight-color: transparent;
    }
    .app {
      max-width: 720px;
      margin: 0 auto;
      padding: 18px 16px calc(40px + var(--safe));
    }
    h1, h2 {
      font-family: var(--display);
      letter-spacing: -0.02em;
      margin: 0 0 8px;
    }
    h1 { font-size: 2.1rem; line-height: 1.15; }
    h2 { font-size: 1.2rem; }
    .eyebrow {
      margin: 0 0 6px;
      color: var(--sea);
      font-weight: 700;
      font-size: 0.92rem;
    }
    .tagline, .muted, .en {
      color: var(--muted);
      line-height: 1.5;
    }
    .tagline { margin: 0 0 14px; }
    .hero {
      margin-bottom: 18px;
      padding: 8px 2px 4px;
    }
    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .stat {
      background: var(--sea-soft);
      color: var(--sea);
      border-radius: 12px;
      padding: 8px 12px;
      font-weight: 700;
      font-size: 0.92rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .card.soft { background: rgba(255,255,255,0.72); }
    .card.center { text-align: center; }
    .block { margin: 18px 0; }
    .section-title {
      margin: 0 0 10px;
      color: var(--sea);
    }
    .goal-list {
      margin: 8px 0 0;
      padding-left: 1.1em;
      line-height: 1.55;
    }
    .games {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .game-btn {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 16px;
      padding: 14px 12px;
      text-align: left;
      font: inherit;
      color: inherit;
      cursor: pointer;
      min-height: 92px;
      transition: transform .12s ease, border-color .12s ease;
    }
    .game-btn:active { transform: scale(0.98); }
    .game-btn strong {
      display: block;
      font-family: var(--display);
      font-size: 1.08rem;
      margin-bottom: 4px;
    }
    .game-btn span {
      display: block;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.4;
    }
    .game-btn em {
      display: block;
      margin-top: 8px;
      font-style: normal;
      color: var(--sea);
      font-size: 0.78rem;
      font-weight: 700;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
    }
    .back, .ghost, .primary, .mini, .choice, .match-card, .word-chip, .tab {
      font: inherit;
      cursor: pointer;
      color: var(--ink);
    }
    .back, .ghost, .primary {
      border-radius: 12px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      background: #fff;
    }
    .primary {
      background: var(--sea);
      border-color: var(--sea);
      color: #fff;
      font-weight: 700;
      width: 100%;
      margin-top: 10px;
    }
    .ghost {
      background: var(--sun-soft);
      border-color: #efd48a;
      margin-top: 8px;
    }
    .back { font-weight: 700; }
    .chip {
      background: var(--sea-soft);
      color: var(--sea);
      border-radius: 12px;
      padding: 8px 12px;
      font-weight: 700;
      font-size: 0.9rem;
    }
    .big-en {
      font-family: var(--display);
      font-size: 1.85rem;
      line-height: 1.25;
      margin: 10px 0;
      word-break: break-word;
    }
    .prompt-line { font-size: 1.35rem; }
    .zh-line {
      font-size: 1.25rem;
      font-weight: 700;
      margin: 8px 0;
    }
    .pos { color: var(--muted); margin: 0; font-size: 0.92rem; }
    .choices, .row { display: grid; gap: 10px; }
    .row { grid-template-columns: 1fr 1fr; margin-top: 10px; }
    .choice {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 14px;
      padding: 14px;
      text-align: left;
      min-height: 52px;
    }
    .choice span {
      display: block;
      color: var(--muted);
      margin-top: 4px;
      font-size: 0.88rem;
    }
    .choice.on { border-color: var(--sea); background: var(--sea-soft); font-weight: 700; }
    .choice.ok, .cloze-input.ok { border-color: var(--ok); background: #e5f5ea; }
    .choice.bad, .cloze-input.bad { border-color: var(--bad); background: #fdeaea; }
    .match-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .match-col { display: grid; gap: 8px; align-content: start; }
    .match-card {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 14px;
      padding: 14px 10px;
      min-height: 68px;
    }
    .match-card.sel { outline: 3px solid var(--sea); background: var(--sea-soft); }
    .match-card.done { opacity: 0.35; pointer-events: none; }
    .spell {
      width: 100%;
      margin: 12px 0 4px;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      font: inherit;
      font-size: 1.15rem;
      text-align: center;
    }
    .tip {
      margin-top: 12px;
      background: var(--sun-soft);
      border-radius: 12px;
      padding: 12px;
      color: #7a5a18;
      line-height: 1.45;
      white-space: pre-wrap;
    }
    .tip.ok { background: #e5f5ea; color: var(--ok); }
    .tip.bad { background: #fdeaea; color: var(--bad); }
    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 8px;
      margin-bottom: 4px;
    }
    .tab {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 0.88rem;
    }
    .tab.on {
      background: var(--sea);
      border-color: var(--sea);
      color: #fff;
      font-weight: 700;
    }
    .cloze-body {
      line-height: 2;
      font-size: 1.02rem;
    }
    .cloze-input {
      display: inline-block;
      width: 7.5em;
      margin: 0 4px;
      padding: 4px 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font: inherit;
      text-align: center;
    }
    .word-pool, .build-line {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0;
      min-height: 44px;
    }
    .build-line {
      background: #f4fbf9;
      border: 1px dashed var(--line);
      border-radius: 14px;
      padding: 12px;
      align-items: center;
    }
    .word-chip {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 12px;
      padding: 10px 12px;
      font-weight: 600;
    }
    .word-chip.on { background: var(--sea-soft); border-color: var(--sea); }
    .order-picked { display: grid; gap: 8px; margin-top: 10px; }
    .order-item {
      display: grid;
      grid-template-columns: 36px 1fr;
      gap: 10px;
      align-items: start;
      background: #f4fbf9;
      border-radius: 12px;
      padding: 10px;
    }
    .order-item span {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--sea);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 700;
      font-size: 0.85rem;
    }
    .order-item p { margin: 2px 0 0; color: var(--muted); font-size: 0.9rem; }
    .dialogue { display: grid; gap: 10px; margin-top: 12px; }
    .line {
      background: #f4fbf9;
      border-radius: 14px;
      padding: 12px;
      position: relative;
    }
    .line p { margin: 4px 0 0; line-height: 1.5; }
    .mini {
      position: absolute;
      right: 10px;
      top: 10px;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 0.8rem;
    }
    .read-body {
      margin-top: 12px;
      line-height: 1.7;
      font-size: 1.05rem;
    }
    .example {
  margin: 12px 0 6px;
  line-height: 1.55;
  font-size: 1.05rem;
  text-align: left;
}
.big-example { font-size: 1.2rem; }
.example mark, .big-example mark {
  background: var(--sun-soft);
  color: var(--ink);
  padding: 0 4px;
  border-radius: 4px;
  font-weight: 700;
}
.tip-note { font-size: 0.9rem; }
.flash-card { cursor: pointer; }
.choice:disabled { opacity: 0.95; }
    @media (max-width: 520px) {
      html { font-size: 16px; }
      .games { grid-template-columns: 1fr; }
      .big-en { font-size: 1.55rem; }
    }
  </style>
</head>
<body>
  <div class="app" id="app"></div>
  <script src="./data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
